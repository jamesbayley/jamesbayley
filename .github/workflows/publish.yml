name: Publish to Production

on:
  push: 
    branches: main
  
jobs:
  publish_static_web_app:
    name: Publish Static Web App
    runs-on: Ubuntu-Latest
    environment:
      name: Production
      url: ${{ steps.deploy.outputs.static_web_app_url }}
      
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3
      
      - name: Deploy Static Web App
        uses: azure/static-web-apps-deploy@v1
        id: deploy
        with:
          azure_static_web_apps_api_token: ${{ secrets.STATIC_WEB_APP_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          api_location: ""
          app_location: "/public"
          output_location: ""
          skip_app_build: true
          skip_api_build: true
